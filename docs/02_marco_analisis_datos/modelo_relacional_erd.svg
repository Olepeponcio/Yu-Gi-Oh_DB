<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">Modelo relacional Yu-Gi-Oh</title>
  <desc id="desc">Diagrama ERD con tablas, claves primarias, claves foraneas, cardinalidades y direccion de filtro recomendada para Power BI.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .table { fill: #ffffff; stroke: #263238; stroke-width: 2; rx: 8; }
      .hub { fill: #eef6ff; stroke: #1f5d99; stroke-width: 2.4; rx: 8; }
      .catalog { fill: #f3f9ef; stroke: #477a31; stroke-width: 2; rx: 8; }
      .header { fill: #263238; }
      .header-hub { fill: #1f5d99; }
      .header-catalog { fill: #477a31; }
      .title { font: 700 28px Arial, sans-serif; fill: #15202b; }
      .subtitle { font: 16px Arial, sans-serif; fill: #40515c; }
      .table-title { font: 700 18px Arial, sans-serif; fill: #ffffff; }
      .col { font: 15px Consolas, "Courier New", monospace; fill: #15202b; }
      .muted { fill: #5d6b73; }
      .pk { fill: #0b5cad; font-weight: 700; }
      .fk { fill: #9a4c00; font-weight: 700; }
      .rel { stroke: #455a64; stroke-width: 2.2; fill: none; }
      .rel-opt { stroke: #6b7d86; stroke-width: 2; fill: none; stroke-dasharray: 7 5; }
      .card { font: 700 14px Arial, sans-serif; fill: #263238; }
      .fk-label { font: 13px Arial, sans-serif; fill: #37474f; }
      .filter-triangle { fill: #1f5d99; stroke: #ffffff; stroke-width: 1.5; }
      .legend-box { fill: #ffffff; stroke: #c9d3da; stroke-width: 1.5; rx: 8; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1120"/>
  <text class="title" x="60" y="56">Modelo relacional Yu-Gi-Oh DB</text>
  <text class="subtitle" x="60" y="86">Fuente: sql/schema.sql. Cardinalidad: 1 = uno, * = muchos. Triangulo central = direccion de filtro unico recomendada.</text>

  <rect class="legend-box" x="1040" y="28" width="500" height="92"/>
  <text class="col pk" x="1100" y="62">PK</text>
  <text class="col" x="1132" y="62">clave primaria</text>
  <text class="col fk" x="1100" y="88">FK</text>
  <text class="col" x="1132" y="88">clave foranea</text>
  <text class="col muted" x="1270" y="62">1, *</text>
  <text class="col" x="1390" y="62">cardinalidad</text>
  <line class="rel" x1="1270" y1="86" x2="1350" y2="86"/>
  <polygon class="filter-triangle" points="1303,79 1317,86 1303,93"/>
  <text class="col" x="1362" y="91">filtro unico</text>
  <line class="rel-opt" x1="1270" y1="108" x2="1350" y2="108"/>
  <text class="col" x="1362" y="113">FK nullable</text>

  <!-- Central table -->
  <g id="cards">
    <rect class="hub" x="610" y="395" width="360" height="282"/>
    <rect class="header-hub" x="610" y="395" width="360" height="42"/>
    <text class="table-title" x="630" y="423">cards</text>
    <text class="col pk" x="630" y="466">PK card_id INT</text>
    <text class="col" x="630" y="493">name VARCHAR(255)</text>
    <text class="col" x="630" y="520">card_type VARCHAR(100)</text>
    <text class="col" x="630" y="547">frame_type VARCHAR(50)</text>
    <text class="col" x="630" y="574">archetype VARCHAR(150)</text>
    <text class="col" x="630" y="601">atk, def, attribute, level</text>
    <text class="col" x="630" y="628">link_value, scale</text>
    <text class="col muted" x="630" y="655">Entidad madre: una fila por carta</text>
  </g>

  <!-- Left side detail tables -->
  <g id="card_images">
    <rect class="table" x="80" y="155" width="360" height="178"/>
    <rect class="header" x="80" y="155" width="360" height="42"/>
    <text class="table-title" x="100" y="183">card_images</text>
    <text class="col pk" x="100" y="226">PK image_id INT</text>
    <text class="col fk" x="100" y="253">FK card_id INT</text>
    <text class="col" x="100" y="280">image_url</text>
    <text class="col" x="100" y="307">image_url_small, cropped</text>
  </g>

  <g id="card_prices">
    <rect class="table" x="80" y="390" width="360" height="188"/>
    <rect class="header" x="80" y="390" width="360" height="42"/>
    <text class="table-title" x="100" y="418">card_prices</text>
    <text class="col pk" x="100" y="461">PK card_id INT</text>
    <text class="col fk" x="100" y="488">FK card_id INT</text>
    <text class="col" x="100" y="515">cardmarket_price</text>
    <text class="col" x="100" y="542">tcgplayer, ebay, amazon</text>
    <text class="col" x="100" y="569">coolstuffinc_price</text>
  </g>

  <g id="card_banlist">
    <rect class="table" x="80" y="635" width="360" height="160"/>
    <rect class="header" x="80" y="635" width="360" height="42"/>
    <text class="table-title" x="100" y="663">card_banlist</text>
    <text class="col pk" x="100" y="706">PK card_id INT</text>
    <text class="col fk" x="100" y="733">FK card_id INT</text>
    <text class="col" x="100" y="760">ban_tcg, ban_ocg, ban_goat</text>
  </g>

  <g id="card_typelines">
    <rect class="table" x="80" y="850" width="360" height="170"/>
    <rect class="header" x="80" y="850" width="360" height="42"/>
    <text class="table-title" x="100" y="878">card_typelines</text>
    <text class="col pk" x="100" y="921">PK card_id INT</text>
    <text class="col pk" x="100" y="948">PK typeline VARCHAR(100)</text>
    <text class="col fk" x="100" y="975">FK card_id INT</text>
    <text class="col" x="100" y="1002">position INT</text>
  </g>

  <!-- Right side detail tables -->
  <g id="card_sets">
    <rect class="table" x="1160" y="250" width="360" height="250"/>
    <rect class="header" x="1160" y="250" width="360" height="42"/>
    <text class="table-title" x="1180" y="278">card_sets</text>
    <text class="col pk" x="1180" y="321">PK id INT</text>
    <text class="col fk" x="1180" y="348">FK card_id INT</text>
    <text class="col fk" x="1180" y="375">FK set_id INT NULL</text>
    <text class="col fk" x="1180" y="402">FK rarity_id INT NULL</text>
    <text class="col" x="1180" y="429">set_name, set_code</text>
    <text class="col" x="1180" y="456">set_rarity, set_price</text>
    <text class="col muted" x="1180" y="483">Grano: carta + set/codigo + rareza</text>
  </g>

  <g id="card_price_history">
    <rect class="table" x="1160" y="555" width="360" height="195"/>
    <rect class="header" x="1160" y="555" width="360" height="42"/>
    <text class="table-title" x="1180" y="583">card_price_history</text>
    <text class="col pk" x="1180" y="626">PK id BIGINT</text>
    <text class="col fk" x="1180" y="653">FK card_id INT</text>
    <text class="col" x="1180" y="680">snapshot_at DATETIME</text>
    <text class="col" x="1180" y="707">marketplace prices</text>
    <text class="col muted" x="1180" y="734">UQ card_id + snapshot_at</text>
  </g>

  <g id="card_linkmarkers">
    <rect class="table" x="1160" y="805" width="360" height="170"/>
    <rect class="header" x="1160" y="805" width="360" height="42"/>
    <text class="table-title" x="1180" y="833">card_linkmarkers</text>
    <text class="col pk" x="1180" y="876">PK card_id INT</text>
    <text class="col pk" x="1180" y="903">PK linkmarker VARCHAR(50)</text>
    <text class="col fk" x="1180" y="930">FK card_id INT</text>
    <text class="col" x="1180" y="957">position INT</text>
  </g>

  <!-- Catalog tables -->
  <g id="sets">
    <rect class="catalog" x="610" y="145" width="360" height="135"/>
    <rect class="header-catalog" x="610" y="145" width="360" height="42"/>
    <text class="table-title" x="630" y="173">sets</text>
    <text class="col pk" x="630" y="216">PK id INT</text>
    <text class="col" x="630" y="243">UQ set_name VARCHAR(255)</text>
  </g>

  <g id="rarities">
    <rect class="catalog" x="610" y="835" width="360" height="165"/>
    <rect class="header-catalog" x="610" y="835" width="360" height="42"/>
    <text class="table-title" x="630" y="863">rarities</text>
    <text class="col pk" x="630" y="906">PK id INT</text>
    <text class="col" x="630" y="933">set_code VARCHAR(100)</text>
    <text class="col" x="630" y="960">rarity_name, rarity_code</text>
    <text class="col muted" x="630" y="987">UQ set_code + name + code</text>
  </g>

  <!-- Relationships from cards -->
  <path class="rel" d="M610 465 L440 244"/>
  <polygon class="filter-triangle" points="0,-7 14,0 0,7" transform="translate(525 354.5) rotate(-128)"/>
  <text class="card" x="575" y="444">1</text>
  <text class="card" x="450" y="255">*</text>
  <text class="fk-label" x="448" y="286">fk_card_images_card</text>

  <path class="rel" d="M610 510 L440 484"/>
  <polygon class="filter-triangle" points="0,-7 14,0 0,7" transform="translate(525 497) rotate(-171)"/>
  <text class="card" x="575" y="505">1</text>
  <text class="card" x="450" y="480">1</text>
  <text class="fk-label" x="448" y="506">fk_card_prices_card</text>

  <path class="rel" d="M610 585 L440 715"/>
  <polygon class="filter-triangle" points="0,-7 14,0 0,7" transform="translate(525 650) rotate(143)"/>
  <text class="card" x="575" y="591">1</text>
  <text class="card" x="450" y="707">1</text>
  <text class="fk-label" x="448" y="735">fk_card_banlist_card</text>

  <path class="rel" d="M640 677 L440 935"/>
  <polygon class="filter-triangle" points="0,-7 14,0 0,7" transform="translate(540 806) rotate(128)"/>
  <text class="card" x="622" y="697">1</text>
  <text class="card" x="450" y="927">*</text>
  <text class="fk-label" x="448" y="957">fk_card_typelines_card</text>

  <path class="rel" d="M970 475 L1160 375"/>
  <polygon class="filter-triangle" points="0,-7 14,0 0,7" transform="translate(1065 425) rotate(-28)"/>
  <text class="card" x="980" y="468">1</text>
  <text class="card" x="1115" y="375">*</text>
  <text class="fk-label" x="1002" y="415">fk_card_sets_card</text>

  <path class="rel" d="M970 590 L1160 650"/>
  <polygon class="filter-triangle" points="0,-7 14,0 0,7" transform="translate(1065 620) rotate(18)"/>
  <text class="card" x="980" y="591">1</text>
  <text class="card" x="1115" y="647">*</text>
  <text class="fk-label" x="1000" y="632">fk_card_price_history_card</text>

  <path class="rel" d="M935 677 L1160 890"/>
  <polygon class="filter-triangle" points="0,-7 14,0 0,7" transform="translate(1047.5 783.5) rotate(43)"/>
  <text class="card" x="948" y="697">1</text>
  <text class="card" x="1115" y="884">*</text>
  <text class="fk-label" x="998" y="805">fk_card_linkmarkers_card</text>

  <!-- Catalog relationships -->
  <path class="rel-opt" d="M815 280 L1160 360"/>
  <polygon class="filter-triangle" points="0,-7 14,0 0,7" transform="translate(987.5 320) rotate(13)"/>
  <text class="card" x="826" y="302">1</text>
  <text class="card" x="1113" y="354">*</text>
  <text class="fk-label" x="914" y="313">fk_card_sets_set</text>
  <text class="fk-label" x="914" y="337">set_id nullable</text>

  <path class="rel-opt" d="M815 835 L1160 390"/>
  <polygon class="filter-triangle" points="0,-7 14,0 0,7" transform="translate(987.5 612.5) rotate(-52)"/>
  <text class="card" x="827" y="820">1</text>
  <text class="card" x="1113" y="407">*</text>
  <text class="fk-label" x="922" y="615">fk_card_sets_rarity</text>
  <text class="fk-label" x="922" y="639">rarity_id nullable</text>

  <text class="subtitle" x="60" y="1085">Nota: las relaciones punteadas indican FK nullable en SQL.</text>
</svg>
