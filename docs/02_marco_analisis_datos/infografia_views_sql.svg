<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2200" viewBox="0 0 1600 2200">
  <rect width="1600" height="2200" fill="#f7f8fb"/>
  <foreignObject x="0" y="0" width="1600" height="2200">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { box-sizing: border-box; }
        body {
          margin: 0;
          font-family: Arial, Helvetica, sans-serif;
          color: #1f2937;
          background: #f7f8fb;
        }
        .page {
          width: 1600px;
          height: 2200px;
          padding: 64px 72px;
        }
        .header {
          display: grid;
          grid-template-columns: 1fr 380px;
          gap: 36px;
          align-items: start;
          margin-bottom: 36px;
        }
        h1 {
          margin: 0 0 12px 0;
          font-size: 54px;
          line-height: 1.05;
          letter-spacing: 0;
          color: #101827;
        }
        .subtitle {
          margin: 0;
          font-size: 24px;
          line-height: 1.35;
          color: #4b5563;
        }
        .legend {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 10px;
          padding: 20px;
          border: 1px solid #d8dee9;
          border-radius: 8px;
          background: #ffffff;
        }
        .legend-item {
          display: flex;
          align-items: center;
          gap: 8px;
          font-size: 18px;
          color: #374151;
        }
        .dot {
          width: 16px;
          height: 16px;
          border-radius: 50%;
          flex: 0 0 auto;
        }
        .dim { background: #2563eb; }
        .fact { background: #059669; }
        .bridge { background: #7c3aed; }
        .agg { background: #d97706; }
        .diag { background: #dc2626; }
        .ref { background: #475569; }
        .workflow {
          display: grid;
          grid-template-columns: repeat(5, 1fr);
          gap: 14px;
          margin-bottom: 34px;
        }
        .step {
          min-height: 102px;
          padding: 18px;
          border-radius: 8px;
          background: #ffffff;
          border: 1px solid #d8dee9;
        }
        .step strong {
          display: block;
          margin-bottom: 8px;
          font-size: 20px;
          color: #111827;
        }
        .step span {
          font-size: 17px;
          line-height: 1.25;
          color: #4b5563;
        }
        table {
          width: 100%;
          border-collapse: separate;
          border-spacing: 0;
          background: #ffffff;
          border: 1px solid #d8dee9;
          border-radius: 8px;
          overflow: hidden;
        }
        th {
          padding: 16px 14px;
          text-align: left;
          font-size: 18px;
          color: #ffffff;
          background: #111827;
        }
        td {
          padding: 14px;
          vertical-align: top;
          font-size: 17px;
          line-height: 1.28;
          border-top: 1px solid #e5e7eb;
        }
        tr:nth-child(even) td { background: #fbfcff; }
        .view {
          font-family: Consolas, "Courier New", monospace;
          font-weight: 700;
          white-space: nowrap;
          color: #111827;
        }
        .tag {
          display: inline-block;
          min-width: 82px;
          padding: 6px 9px;
          border-radius: 6px;
          font-size: 15px;
          font-weight: 700;
          color: #ffffff;
          text-align: center;
        }
        .tag.dim { background: #2563eb; }
        .tag.fact { background: #059669; }
        .tag.bridge { background: #7c3aed; }
        .tag.agg { background: #d97706; }
        .tag.diag { background: #dc2626; }
        .tag.ref { background: #475569; }
        .small {
          font-size: 15px;
          color: #6b7280;
          margin-top: 6px;
        }
        .footer {
          margin-top: 28px;
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 18px;
        }
        .box {
          padding: 18px 20px;
          border: 1px solid #d8dee9;
          border-radius: 8px;
          background: #ffffff;
          font-size: 18px;
          line-height: 1.35;
        }
        .box strong {
          display: block;
          margin-bottom: 8px;
          font-size: 20px;
          color: #111827;
        }
      </style>
      <div class="page">
        <div class="header">
          <div>
            <h1>Mapa de views SQL para Power BI</h1>
            <p class="subtitle">Proyecto SQL DB Yu-Gi-Oh. Tabla de trabajo para construir la capa semantica en MySQL antes de cargar el modelo en Power BI.</p>
          </div>
          <div class="legend">
            <div class="legend-item"><span class="dot dim"></span>vw_dim_: entidades</div>
            <div class="legend-item"><span class="dot fact"></span>vw_fact_: metricas</div>
            <div class="legend-item"><span class="dot bridge"></span>vw_bridge_: relaciones</div>
            <div class="legend-item"><span class="dot agg"></span>vw_agg_: resumenes</div>
            <div class="legend-item"><span class="dot diag"></span>vw_diag_: diagnostico</div>
            <div class="legend-item"><span class="dot ref"></span>vw_ref_: catalogos</div>
          </div>
        </div>

        <div class="workflow">
          <div class="step"><strong>1. Tablas base</strong><span>cards, sets, rarities, card_sets, card_prices, card_price_history, card_banlist.</span></div>
          <div class="step"><strong>2. Dimensiones</strong><span>Definen filtros limpios y relaciones estables.</span></div>
          <div class="step"><strong>3. Hechos</strong><span>Contienen precios, historico y mediciones analizables.</span></div>
          <div class="step"><strong>4. Diagnostico</strong><span>Detecta errores, extremos o hipotesis antes del informe.</span></div>
          <div class="step"><strong>5. Power BI</strong><span>Consume views limpias, no tablas base sin preparar.</span></div>
        </div>

        <table>
          <thead>
            <tr>
              <th style="width: 250px;">View</th>
              <th style="width: 115px;">Tipo</th>
              <th style="width: 355px;">Que debe responder</th>
              <th style="width: 335px;">Consulta a construir</th>
              <th>Campos guia</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><span class="view">vw_dim_card</span></td>
              <td><span class="tag dim">DIM</span></td>
              <td>Que es cada carta y como se puede filtrar.</td>
              <td>Una fila por carta desde <b>cards</b>, sin duplicados.</td>
              <td>card_id, name, card_type, frame_type, attribute, level, atk, def, archetype.</td>
            </tr>
            <tr>
              <td><span class="view">vw_dim_set</span></td>
              <td><span class="tag dim">DIM</span></td>
              <td>Que sets o expansiones existen para segmentar productos.</td>
              <td>Catalogo limpio desde <b>sets</b>.</td>
              <td>set_id, set_name, set_code_base, release_date si existe, total_printings.</td>
            </tr>
            <tr>
              <td><span class="view">vw_dim_rarity</span></td>
              <td><span class="tag dim">DIM</span></td>
              <td>Que rarezas aparecen y como agruparlas.</td>
              <td>Catalogo desde <b>rarities</b>, normalizando nombres.</td>
              <td>rarity_id, rarity_name, rarity_code, rarity_group.</td>
            </tr>
            <tr>
              <td><span class="view">vw_dim_date</span></td>
              <td><span class="tag dim">DIM</span></td>
              <td>Como analizar snapshots por dia, mes y anio.</td>
              <td>Generar fechas desde <b>card_price_history.snapshot_at</b> o crear en Power BI.</td>
              <td>date, year, quarter, month, month_name, week, day.</td>
            </tr>
            <tr>
              <td><span class="view">vw_ref_banlist_status</span></td>
              <td><span class="tag ref">REF</span></td>
              <td>Como traducir estados competitivos a categorias consistentes.</td>
              <td>Referencia manual o SELECT DISTINCT sobre <b>card_banlist</b>.</td>
              <td>ban_status, normalized_status, sort_order, is_playable.</td>
            </tr>
            <tr>
              <td><span class="view">vw_bridge_card_set</span></td>
              <td><span class="tag bridge">BRIDGE</span></td>
              <td>En que set aparece cada carta, con que codigo y rareza.</td>
              <td>Join de <b>card_sets</b> con sets y rarities.</td>
              <td>card_id, set_id, rarity_id, set_code, set_name, set_price.</td>
            </tr>
            <tr>
              <td><span class="view">vw_fact_card_prices</span></td>
              <td><span class="tag fact">FACT</span></td>
              <td>Cuanto vale cada carta por marketplace actualmente.</td>
              <td>Unpivot de <b>card_prices</b> a filas: carta, mercado, precio, moneda.</td>
              <td>card_id, marketplace, price, currency. Separar EUR de USD.</td>
            </tr>
            <tr>
              <td><span class="view">vw_fact_price_history</span></td>
              <td><span class="tag fact">FACT</span></td>
              <td>Como cambia el precio entre ejecuciones del ETL.</td>
              <td>Unpivot historico desde <b>card_price_history</b>.</td>
              <td>card_id, snapshot_at, marketplace, price, currency.</td>
            </tr>
            <tr>
              <td><span class="view">vw_fact_card_printings</span></td>
              <td><span class="tag fact">FACT</span></td>
              <td>Cuantas impresiones o apariciones tiene una carta.</td>
              <td>Hecho granular desde <b>card_sets</b>, una fila por impresion.</td>
              <td>card_id, set_id, rarity_id, set_code, set_price.</td>
            </tr>
            <tr>
              <td><span class="view">vw_agg_card_price_current</span></td>
              <td><span class="tag agg">AGG</span></td>
              <td>Que cartas lideran el valor actual sin revisar mercado por mercado.</td>
              <td>Agregado sobre <b>vw_fact_card_prices</b>.</td>
              <td>card_id, avg_usd_price, max_usd_price, markets_count, has_eur_price.</td>
            </tr>
            <tr>
              <td><span class="view">vw_agg_set_value</span></td>
              <td><span class="tag agg">AGG</span></td>
              <td>Que sets concentran mas valor potencial.</td>
              <td>Agregado de <b>vw_bridge_card_set</b> por set.</td>
              <td>set_id, total_printings, avg_set_price, max_set_price, total_set_value.</td>
            </tr>
            <tr>
              <td><span class="view">vw_agg_rarity_price_impact</span></td>
              <td><span class="tag agg">AGG</span></td>
              <td>Que rarezas elevan mas el precio medio.</td>
              <td>Agregado por rarity desde <b>card_sets</b> y rarities.</td>
              <td>rarity_id, total_cards, avg_set_price, median_estimate, max_set_price.</td>
            </tr>
            <tr>
              <td><span class="view">vw_diag_cards_without_price</span></td>
              <td><span class="tag diag">DIAG</span></td>
              <td>Que cartas no tienen precio y pueden romper rankings.</td>
              <td>LEFT JOIN cards contra <b>card_prices</b> y precios nulos o cero.</td>
              <td>card_id, name, missing_marketplaces, reason_hint.</td>
            </tr>
            <tr>
              <td><span class="view">vw_diag_orphan_relations</span></td>
              <td><span class="tag diag">DIAG</span></td>
              <td>Que relaciones apuntan a entidades inexistentes.</td>
              <td>LEFT JOIN desde tablas hijas hacia cards, sets o rarities.</td>
              <td>source_table, source_id, missing_entity, missing_key.</td>
            </tr>
            <tr>
              <td><span class="view">vw_diag_price_outliers</span></td>
              <td><span class="tag diag">DIAG</span></td>
              <td>Que precios extremos deben revisarse antes de concluir.</td>
              <td>Filtrar precios por umbral alto o regla estadistica.</td>
              <td>card_id, name, set_code, rarity_name, set_price.</td>
            </tr>
            <tr>
              <td><span class="view">vw_diag_price_by_rarity</span></td>
              <td><span class="tag diag">DIAG</span></td>
              <td>Si la rareza explica diferencias relevantes de precio.</td>
              <td>Agrupar card_sets por rareza y codigo de impresion.</td>
              <td>rarity_id, total_printings, avg_set_price, min, max, total_market_value.</td>
            </tr>
            <tr>
              <td><span class="view">vw_diag_high_demand_archetypes</span></td>
              <td><span class="tag diag">DIAG</span></td>
              <td>Que arquetipos parecen concentrar demanda o valor.</td>
              <td>Agrupar cartas y apariciones por archetype.</td>
              <td>archetype, total_cards, total_printings, avg_set_price, estimated_market_weight.</td>
            </tr>
            <tr>
              <td><span class="view">vw_diag_competitive_staple_candidates</span></td>
              <td><span class="tag diag">DIAG</span></td>
              <td>Que cartas pueden actuar como staples competitivas.</td>
              <td>Combinar cards, card_sets y banlist con reglas de precio y reimpresion.</td>
              <td>card_id, name, ban_tcg, total_printings, avg_set_price, max_set_price.</td>
            </tr>
          </tbody>
        </table>

        <div class="footer">
          <div class="box">
            <strong>Orden recomendado de construccion</strong>
            1. Crear dimensiones y referencias. 2. Crear bridges. 3. Crear facts. 4. Crear agregados. 5. Crear diagnosticos y revisar calidad.
          </div>
          <div class="box">
            <strong>Regla de decision</strong>
            Si la view filtra, es <b>dim</b> o <b>ref</b>. Si mide, es <b>fact</b>. Si une muchos-a-muchos, es <b>bridge</b>. Si resume, es <b>agg</b>. Si valida o detecta problemas, es <b>diag</b>.
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
