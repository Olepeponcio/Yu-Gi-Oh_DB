<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .title { font-family: Segoe UI, Arial, sans-serif; font-size: 42px; font-weight: 750; fill: #142033; }
      .subtitle { font-family: Segoe UI, Arial, sans-serif; font-size: 19px; fill: #526070; }
      .bandTitle { font-family: Segoe UI, Arial, sans-serif; font-size: 20px; font-weight: 750; fill: #142033; }
      .table { fill: #ffffff; stroke: #cfd8e6; stroke-width: 2; rx: 10; }
      .headDim { fill: #2267d8; }
      .headBridge { fill: #7357dc; }
      .headFact { fill: #168a68; }
      .headRef { fill: #c06c16; }
      .headDate { fill: #5c6675; }
      .headDiag { fill: #8a3ffc; }
      .headText { font-family: Segoe UI, Arial, sans-serif; font-size: 17px; font-weight: 750; fill: #ffffff; }
      .field { font-family: Consolas, Menlo, monospace; font-size: 14px; fill: #2b3548; }
      .key { font-family: Consolas, Menlo, monospace; font-size: 14px; font-weight: 750; fill: #0f766e; }
      .caption { font-family: Segoe UI, Arial, sans-serif; font-size: 14px; fill: #526070; }
      .note { font-family: Segoe UI, Arial, sans-serif; font-size: 15px; fill: #526070; }
      .rel { stroke: #344054; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .relDate { stroke: #667085; stroke-width: 2.5; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrowDate); }
      .label { font-family: Segoe UI, Arial, sans-serif; font-size: 13px; font-weight: 650; fill: #344054; }
      .legend { font-family: Segoe UI, Arial, sans-serif; font-size: 15px; fill: #253044; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
    <marker id="arrowDate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667085"/>
    </marker>
  </defs>

  <rect class="bg" width="1800" height="1200"/>

  <text class="title" x="70" y="72">Modelo relacional Power BI</text>
  <text class="subtitle" x="72" y="106">Views semánticas importadas desde MySQL · Proyecto SQL DB Yu-Gi-Oh · Filtro recomendado: dirección única desde dimensiones/referencias hacia hechos.</text>

  <rect x="70" y="135" width="1660" height="68" rx="10" fill="#162033"/>
  <text x="100" y="164" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="750" fill="#ffffff">Decisión que guía el modelo</text>
  <text x="100" y="190" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#dce6f2">Identificar cartas, rarezas, sets y precios del mercado secundario que orienten decisiones sobre productos comerciales de Yu-Gi-Oh.</text>

  <text class="bandTitle" x="70" y="250">Núcleo relacional del modelo</text>
  <text class="caption" x="70" y="275">Dimensiones y referencias filtran puentes y hechos. Las tablas diagnósticas quedan fuera del núcleo.</text>

  <!-- Relation lines -->
  <path class="rel" d="M 360 375 C 445 375 445 375 530 375"/>
  <text class="label" x="407" y="360">1 → *</text>

  <path class="rel" d="M 360 565 C 445 565 445 435 530 435"/>
  <text class="label" x="407" y="532">1 → *</text>

  <path class="rel" d="M 360 742 C 445 742 445 495 530 495"/>
  <text class="label" x="407" y="704">1 → *</text>

  <path class="rel" d="M 360 375 C 445 375 445 665 530 665"/>
  <text class="label" x="407" y="636">1 → *</text>

  <path class="rel" d="M 850 665 C 935 665 935 665 1020 665"/>
  <text class="label" x="910" y="650">* ← 1</text>

  <path class="rel" d="M 360 375 C 715 375 715 346 1070 346"/>
  <text class="label" x="700" y="332">1 → *</text>

  <path class="rel" d="M 360 375 C 715 375 715 512 1070 512"/>
  <text class="label" x="700" y="498">1 → *</text>

  <path class="relDate" d="M 1450 512 C 1510 512 1510 604 1450 604"/>
  <text class="label" x="1518" y="560">1 → *</text>

  <!-- Dimensions -->
  <g transform="translate(70 310)">
    <rect class="table" width="290" height="160"/>
    <rect class="headDim" width="290" height="42" rx="10"/>
    <text class="headText" x="16" y="27">vw_dim_card</text>
    <text class="key" x="16" y="68">card_id</text>
    <text class="field" x="16" y="94">name</text>
    <text class="field" x="16" y="120">card_type</text>
    <text class="field" x="16" y="146">archetype, atk, def...</text>
  </g>

  <g transform="translate(70 515)">
    <rect class="table" width="290" height="120"/>
    <rect class="headDim" width="290" height="42" rx="10"/>
    <text class="headText" x="16" y="27">vw_dim_set</text>
    <text class="key" x="16" y="68">set_id</text>
    <text class="field" x="16" y="94">set_name</text>
  </g>

  <g transform="translate(70 695)">
    <rect class="table" width="290" height="145"/>
    <rect class="headDim" width="290" height="42" rx="10"/>
    <text class="headText" x="16" y="27">vw_dim_rarity</text>
    <text class="key" x="16" y="68">rarity_id</text>
    <text class="field" x="16" y="94">set_code</text>
    <text class="field" x="16" y="120">rarity_name, rarity_code</text>
  </g>

  <!-- Bridges -->
  <g transform="translate(530 315)">
    <rect class="table" width="320" height="215"/>
    <rect class="headBridge" width="320" height="42" rx="10"/>
    <text class="headText" x="16" y="27">vw_bridge_card_set</text>
    <text class="key" x="16" y="68">card_set_id</text>
    <text class="key" x="16" y="94">card_id</text>
    <text class="key" x="16" y="120">set_id</text>
    <text class="key" x="16" y="146">rarity_id</text>
    <text class="field" x="16" y="172">set_code, set_rarity</text>
    <text class="field" x="16" y="198">set_price</text>
  </g>

  <g transform="translate(530 610)">
    <rect class="table" width="320" height="150"/>
    <rect class="headBridge" width="320" height="42" rx="10"/>
    <text class="headText" x="16" y="27">vw_bridge_card_banlist</text>
    <text class="key" x="16" y="68">card_id</text>
    <text class="field" x="16" y="94">format</text>
    <text class="field" x="16" y="120">ban_status</text>
    <text class="key" x="16" y="146">banlist_status_key</text>
  </g>

  <!-- Facts -->
  <g transform="translate(1070 280)">
    <rect class="table" width="380" height="170"/>
    <rect class="headFact" width="380" height="42" rx="10"/>
    <text class="headText" x="16" y="27">vw_fact_card_prices</text>
    <text class="key" x="16" y="68">card_id</text>
    <text class="field" x="16" y="94">marketplace</text>
    <text class="field" x="16" y="120">price</text>
    <text class="field" x="16" y="146">currency</text>
  </g>

  <g transform="translate(1070 475)">
    <rect class="table" width="380" height="190"/>
    <rect class="headFact" width="380" height="42" rx="10"/>
    <text class="headText" x="16" y="27">vw_fact_price_history</text>
    <text class="key" x="16" y="68">card_id</text>
    <text class="field" x="16" y="94">snapshot_at</text>
    <text class="key" x="16" y="120">snapshot_date</text>
    <text class="field" x="16" y="146">marketplace, price</text>
    <text class="field" x="16" y="172">currency</text>
  </g>

  <!-- Reference and date -->
  <g transform="translate(1020 610)">
    <rect class="table" width="350" height="165"/>
    <rect class="headRef" width="350" height="42" rx="10"/>
    <text class="headText" x="16" y="27">vw_ref_banlist_status</text>
    <text class="field" x="16" y="68">format</text>
    <text class="field" x="16" y="94">ban_status</text>
    <text class="key" x="16" y="120">banlist_status_key</text>
    <text class="field" x="16" y="146">is_playable, sort_order</text>
  </g>

  <g transform="translate(1480 560)">
    <rect class="table" width="250" height="150"/>
    <rect class="headDate" width="250" height="42" rx="10"/>
    <text class="headText" x="16" y="27">Calendario</text>
    <text class="key" x="16" y="68">Date</text>
    <text class="field" x="16" y="94">Año, Mes</text>
    <text class="field" x="16" y="120">Año Mes, Trimestre</text>
  </g>

  <!-- Rules -->
  <g transform="translate(1480 280)">
    <rect x="0" y="0" width="250" height="210" rx="10" fill="#ffffff" stroke="#cfd8e6" stroke-width="2"/>
    <text class="bandTitle" x="18" y="34">Reglas del modelo</text>
    <text class="note" x="18" y="68">1. Filtro cruzado único.</text>
    <text class="note" x="18" y="96">2. No mezclar EUR/USD.</text>
    <text class="note" x="18" y="124">3. Diagnósticas fuera</text>
    <text class="note" x="36" y="146">del núcleo.</text>
    <text class="note" x="18" y="176">4. Calendario se crea</text>
    <text class="note" x="36" y="198">en Power BI.</text>
  </g>

  <!-- Diagnostics -->
  <text class="bandTitle" x="70" y="910">Views diagnósticas para páginas auxiliares</text>
  <text class="caption" x="70" y="935">Se pueden usar en visuales propios, pero no deben forzar relaciones bidireccionales con el núcleo.</text>

  <g transform="translate(70 965)">
    <rect class="table" width="380" height="125"/>
    <rect class="headDiag" width="380" height="42" rx="10"/>
    <text class="headText" x="16" y="27">vw_diag_price_by_rarity</text>
    <text class="field" x="16" y="70">Precio por rareza y código de impresión</text>
    <text class="field" x="16" y="96">avg_set_price, total_printings</text>
  </g>

  <g transform="translate(485 965)">
    <rect class="table" width="350" height="125"/>
    <rect class="headDiag" width="350" height="42" rx="10"/>
    <text class="headText" x="16" y="27">vw_diag_price_outliers</text>
    <text class="field" x="16" y="70">Precios extremos</text>
    <text class="field" x="16" y="96">control antes de concluir</text>
  </g>

  <g transform="translate(870 965)">
    <rect class="table" width="390" height="125"/>
    <rect class="headDiag" width="390" height="42" rx="10"/>
    <text class="headText" x="16" y="27">vw_diag_high_demand_archetypes</text>
    <text class="field" x="16" y="70">Arquetipos con peso estimado</text>
    <text class="field" x="16" y="96">total_cards, estimated_market_weight</text>
  </g>

  <g transform="translate(1295 965)">
    <rect class="table" width="435" height="125"/>
    <rect class="headDiag" width="435" height="42" rx="10"/>
    <text class="headText" x="16" y="27">vw_diag_competitive_staple_candidates</text>
    <text class="field" x="16" y="70">Cartas candidatas por legalidad, precio</text>
    <text class="field" x="16" y="96">y reimpresiones</text>
  </g>

  <!-- Legend -->
  <rect x="70" y="1120" width="1660" height="46" rx="10" fill="#e8eef7"/>
  <circle cx="105" cy="1143" r="9" fill="#2267d8"/>
  <text class="legend" x="122" y="1148">Dim</text>
  <circle cx="178" cy="1143" r="9" fill="#7357dc"/>
  <text class="legend" x="195" y="1148">Bridge</text>
  <circle cx="285" cy="1143" r="9" fill="#168a68"/>
  <text class="legend" x="302" y="1148">Fact</text>
  <circle cx="370" cy="1143" r="9" fill="#c06c16"/>
  <text class="legend" x="387" y="1148">Ref</text>
  <circle cx="438" cy="1143" r="9" fill="#5c6675"/>
  <text class="legend" x="455" y="1148">Calendario Power BI</text>
  <circle cx="640" cy="1143" r="9" fill="#8a3ffc"/>
  <text class="legend" x="657" y="1148">Diagnóstico</text>
  <text class="legend" x="850" y="1148">Relaciones clave: card_id, set_id, rarity_id, banlist_status_key y snapshot_date.</text>
</svg>
