<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .title { font-family: Segoe UI, Arial, sans-serif; font-size: 44px; font-weight: 700; fill: #172033; }
      .subtitle { font-family: Segoe UI, Arial, sans-serif; font-size: 20px; fill: #526070; }
      .section { font-family: Segoe UI, Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #172033; }
      .card { fill: #ffffff; stroke: #d9e1ec; stroke-width: 2; rx: 8; }
      .num { font-family: Segoe UI, Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #ffffff; }
      .q { font-family: Segoe UI, Arial, sans-serif; font-size: 21px; font-weight: 700; fill: #172033; }
      .label { font-family: Segoe UI, Arial, sans-serif; font-size: 15px; font-weight: 700; fill: #526070; letter-spacing: .3px; }
      .txt { font-family: Segoe UI, Arial, sans-serif; font-size: 17px; fill: #253044; }
      .small { font-family: Segoe UI, Arial, sans-serif; font-size: 15px; fill: #526070; }
      .chip { fill: #edf4ff; stroke: #bfd6ff; stroke-width: 1; rx: 6; }
      .chipText { font-family: Consolas, Menlo, monospace; font-size: 14px; fill: #1c4f8f; }
      .accent1 { fill: #2f6fed; }
      .accent2 { fill: #1f9d75; }
      .accent3 { fill: #c77d16; }
      .accent4 { fill: #7d5cf3; }
      .line { stroke: #c8d2df; stroke-width: 3; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1100"/>

  <text class="title" x="80" y="86">Preguntas marco para la vista de informe</text>
  <text class="subtitle" x="82" y="122">Proyecto SQL DB Yu-Gi-Oh · Fuente canónica: docs/02_marco_analisis_datos/README.md</text>

  <rect x="80" y="160" width="1440" height="84" rx="8" fill="#172033"/>
  <text x="112" y="196" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Decisión analítica</text>
  <text x="112" y="226" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#dce6f2">Identificar qué cartas, rarezas, sets y precios del mercado secundario pueden orientar decisiones sobre productos comerciales de Yu-Gi-Oh.</text>

  <line class="line" x1="800" y1="272" x2="800" y2="1000"/>
  <text class="section" x="80" y="302">1. Valor actual y mercado</text>
  <text class="section" x="850" y="302">2. Catálogo, producto y evolución</text>

  <!-- Q1 -->
  <rect class="card" x="80" y="330" width="690" height="145"/>
  <circle class="accent1" cx="122" cy="370" r="24"/>
  <text class="num" x="116" y="378">1</text>
  <text class="q" x="162" y="368">¿Qué cartas tienen mayor precio medio</text>
  <text class="q" x="162" y="396">por marketplace?</text>
  <text class="label" x="112" y="430">FOCO</text>
  <text class="txt" x="170" y="430">ranking de cartas, precio medio, marketplace</text>
  <rect class="chip" x="112" y="445" width="265" height="28"/>
  <text class="chipText" x="124" y="464">vw_fact_card_prices</text>
  <rect class="chip" x="392" y="445" width="160" height="28"/>
  <text class="chipText" x="404" y="464">vw_dim_card</text>

  <!-- Q2 -->
  <rect class="card" x="80" y="500" width="690" height="145"/>
  <circle class="accent1" cx="122" cy="540" r="24"/>
  <text class="num" x="116" y="548">2</text>
  <text class="q" x="162" y="538">¿Qué rarezas se asocian con</text>
  <text class="q" x="162" y="566">precios más altos?</text>
  <text class="label" x="112" y="600">FOCO</text>
  <text class="txt" x="170" y="600">rareza, precio medio, extremos y volumen</text>
  <rect class="chip" x="112" y="615" width="285" height="28"/>
  <text class="chipText" x="124" y="634">vw_diag_price_by_rarity</text>
  <rect class="chip" x="412" y="615" width="170" height="28"/>
  <text class="chipText" x="424" y="634">vw_dim_rarity</text>

  <!-- Q7 -->
  <rect class="card" x="80" y="670" width="690" height="172"/>
  <circle class="accent1" cx="122" cy="710" r="24"/>
  <text class="num" x="116" y="718">7</text>
  <text class="q" x="162" y="708">¿Qué diferencias existen entre precios</text>
  <text class="q" x="162" y="736">de Cardmarket, TCGPlayer, eBay,</text>
  <text class="q" x="162" y="764">Amazon y CoolStuffInc?</text>
  <text class="label" x="112" y="800">FOCO</text>
  <text class="txt" x="170" y="800">comparativa por marketplace sin mezclar EUR/USD</text>
  <rect class="chip" x="112" y="815" width="285" height="28"/>
  <text class="chipText" x="124" y="834">vw_fact_price_history</text>
  <rect class="chip" x="412" y="815" width="180" height="28"/>
  <text class="chipText" x="424" y="834">currency</text>

  <!-- Quality note -->
  <rect x="80" y="870" width="690" height="100" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text class="label" x="112" y="905">CONTROL PREVIO</text>
  <text class="txt" x="112" y="935">Revisar outliers antes de concluir sobre precios extremos.</text>
  <rect class="chip" x="112" y="950" width="245" height="28"/>
  <text class="chipText" x="124" y="969">vw_diag_price_outliers</text>

  <!-- Q3 -->
  <rect class="card" x="850" y="330" width="670" height="145"/>
  <circle class="accent2" cx="892" cy="370" r="24"/>
  <text class="num" x="886" y="378">3</text>
  <text class="q" x="932" y="368">¿Qué sets acumulan más</text>
  <text class="q" x="932" y="396">valor potencial?</text>
  <text class="label" x="882" y="430">FOCO</text>
  <text class="txt" x="940" y="430">set, apariciones, set_price, valor agregado</text>
  <rect class="chip" x="882" y="445" width="255" height="28"/>
  <text class="chipText" x="894" y="464">vw_bridge_card_set</text>
  <rect class="chip" x="1152" y="445" width="145" height="28"/>
  <text class="chipText" x="1164" y="464">vw_dim_set</text>

  <!-- Q4 -->
  <rect class="card" x="850" y="500" width="670" height="145"/>
  <circle class="accent3" cx="892" cy="540" r="24"/>
  <text class="num" x="886" y="548">4</text>
  <text class="q" x="932" y="538">¿Qué tipos de carta dominan</text>
  <text class="q" x="932" y="566">el catálogo?</text>
  <text class="label" x="882" y="600">FOCO</text>
  <text class="txt" x="940" y="600">distribución por tipo y subtipo legible</text>
  <rect class="chip" x="882" y="615" width="170" height="28"/>
  <text class="chipText" x="894" y="634">vw_dim_card</text>
  <rect class="chip" x="1068" y="615" width="270" height="28"/>
  <text class="chipText" x="1080" y="634">human_readable_card_type</text>

  <!-- Q5 -->
  <rect class="card" x="850" y="670" width="670" height="145"/>
  <circle class="accent3" cx="892" cy="710" r="24"/>
  <text class="num" x="886" y="718">5</text>
  <text class="q" x="932" y="708">¿Qué cartas aparecen en</text>
  <text class="q" x="932" y="736">más sets?</text>
  <text class="label" x="882" y="770">FOCO</text>
  <text class="txt" x="940" y="770">conteo de impresiones y presencia por set</text>
  <rect class="chip" x="882" y="785" width="255" height="28"/>
  <text class="chipText" x="894" y="804">vw_bridge_card_set</text>
  <rect class="chip" x="1152" y="785" width="160" height="28"/>
  <text class="chipText" x="1164" y="804">vw_dim_card</text>

  <!-- Q6 -->
  <rect class="card" x="850" y="840" width="670" height="145"/>
  <circle class="accent4" cx="892" cy="880" r="24"/>
  <text class="num" x="886" y="888">6</text>
  <text class="q" x="932" y="878">¿Qué cartas muestran variación</text>
  <text class="q" x="932" y="906">de precio entre ejecuciones del ETL?</text>
  <text class="label" x="882" y="940">FOCO</text>
  <text class="txt" x="940" y="940">snapshots, tendencia y calendario</text>
  <rect class="chip" x="882" y="955" width="285" height="28"/>
  <text class="chipText" x="894" y="974">vw_fact_price_history</text>
  <rect class="chip" x="1182" y="955" width="145" height="28"/>
  <text class="chipText" x="1194" y="974">Calendario</text>

  <rect x="80" y="1015" width="1440" height="48" rx="8" fill="#e9eef7"/>
  <text class="small" x="112" y="1045">Regla de trabajo: cada visual debe responder una pregunta marco o justificar su papel como control de calidad, segmentación o contexto narrativo.</text>
</svg>
